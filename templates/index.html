<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Pronta Entrega</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Estoque Pronta Entrega</h1>

    <div class="container">
        {% for produto in produtos %}
        <div class="card">
            {% if produto.IMAGEM_PRODUTO %}
                <img src="{{ produto.IMAGEM_PRODUTO }}" alt="{{ produto.PRODUTO }}">
            {% else %}
                <img src="{{ url_for('static', filename='sem_imagem.png') }}" alt="Sem imagem">
            {% endif %}
            <h2>{{ produto.PRODUTO }}</h2>
            <p>{{ produto.MARCA }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
