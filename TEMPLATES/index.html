<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Pronta Entrega</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
        }
        header {
            background: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            letter-spacing: 1px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        .card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: scale(1.03);
        }
        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid #ddd;
        }
        .info {
            padding: 15px;
        }
        .info h3 {
            margin: 0;
            font-size: 18px;
            color: #111827;
        }
        .info p {
            color: #4b5563;
            margin: 5px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>🛋️ Catálogo de Produtos - Pronta Entrega</header>

    <div class="grid">
        {% for p in produtos %}
        <div class="card">
            {% if p['LINK_IMAGEM'] %}
                <img src="{{ url_for('static', filename=p['LINK_IMAGEM']) }}" alt="Imagem do produto">
            {% else %}
                <img src="{{ url_for('static', filename='sem_foto.jpg') }}" alt="Sem imagem disponível">
            {% endif %}
            <div class="info">
                <h3>{{ p['DESCRIÇÃO DO PRODUTO'] }}</h3>
                <p><b>Marca:</b> {{ p['MARCA'] }}</p>
                <p><b>Código:</b> {{ p['CÓDIGO DO PRODUTO'] }}</p>
                <p><b>Estoque:</b> {{ p['ESTOQUE DISPONIVEL'] }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
