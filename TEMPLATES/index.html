<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estoque - Pronta Entrega</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            padding: 20px;
        }
        .produto {
            display: inline-block;
            width: 250px;
            background: #fff;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            vertical-align: top;
        }
        .produto img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .descricao {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Estoque Pronta Entrega</h1>
    {% for p in produtos %}
        <div class="produto">
            {% if p.LINK_IMAGEM %}
                <img src="{{ url_for('static', filename=p.LINK_IMAGEM) }}" alt="{{ p['DESCRIÇÃO DO PRODUTO'] }}">
            {% endif %}
            <div class="descricao">{{ p['DESCRIÇÃO DO PRODUTO'] }}</div>
            <div>{{ p.MARCA }}</div>
        </div>
    {% endfor %}
</body>
</html>
